<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarCorp · SeWa666 — iOS style</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            padding: 1.5rem;
            position: relative;
        }

        /* iOS-подібний градієнтний фон */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(60, 120, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(180, 80, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* iOS-стиль glassmorphism — легке матове скло з тонкою рамкою */
        .glass-window {
            flex: 1 1 380px;
            min-width: 300px;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(180%);
            -webkit-backdrop-filter: blur(60px) saturate(180%);
            border-radius: 44px;
            padding: 2.4rem 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.8),
                inset 0 0.5px 0 rgba(255, 255, 255, 0.04),
                0 0 0 0.5px rgba(255, 255, 255, 0.02);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* iOS-блиск на склі */
        .glass-window::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -30%;
            width: 160%;
            height: 80%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .glass-window:hover {
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), inset 0 0.5px 0 rgba(255, 255, 255, 0.05);
        }

        /* контейнер для двох вікон — iOS-style spacing */
        .twin-container {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 2.4rem;
            justify-content: center;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        /* iOS-заголовки — великі, жирні, з тонким градієнтом */
        .window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            padding-bottom: 0.6rem;
            position: relative;
            z-index: 2;
        }

        .window-header h2 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f9ff 0%, #b3daff 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .window-header h2 i {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
            padding: 0.3rem;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }

        /* iOS-бейджі — маленькі, округлі, матові */
        .status-badge {
            font-size: 0.6rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.01);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.55rem;
        }

        .status-badge i {
            font-size: 0.45rem;
        }

        /* iOS-форма — чиста, мінімалістична */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: rgba(255, 255, 255, 0.08);
            margin-left: 0.8rem;
        }

        .field label i {
            margin-right: 6px;
            opacity: 0.2;
        }

        /* iOS-стиль інпутів — округлі, з внутрішньою тінню */
        .field input {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 1rem 1.6rem;
            font-size: 1rem;
            font-weight: 400;
            color: #fff;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .field input:focus {
            border-color: rgba(120, 180, 255, 0.08);
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 0 30px rgba(60, 140, 255, 0.02), inset 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.02);
            font-weight: 300;
        }

        /* iOS-кнопка — стильна, з ледь помітним градієнтом */
        .login-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 1rem 2rem;
            font-weight: 500;
            color: #d0e6ff;
            font-size: 1rem;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.6rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.01);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-btn i {
            color: #7eb3ff;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            transform: scale(1.01);
            box-shadow: 0 8px 40px rgba(60, 150, 255, 0.02);
            color: white;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        /* iOS-статус авторизації — мініатюрний індикатор */
        .auth-status {
            font-size: 0.65rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
            padding-right: 0.5rem;
            margin-top: 0.2rem;
        }

        .auth-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.5s;
            box-shadow: 0 0 6px rgba(0,0,0,0.2);
        }

        .dot.green {
            background: #5dffa0;
            box-shadow: 0 0 20px rgba(70, 255, 130, 0.08);
        }

        .dot.red {
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.05);
        }

        /* iOS-сітка — дві колонки з великими картками */
        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin: 0.5rem 0 0.6rem;
            flex: 1;
            align-content: start;
            position: relative;
            z-index: 2;
        }

        .glass-item {
            background: rgba(255, 255, 255, 0.005);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.4rem 0.4rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.005);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .glass-item:hover {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.01);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .item-name {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            background: rgba(255,255,255,0.005);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        .item-name i {
            margin-right: 6px;
            opacity: 0.15;
        }

        /* iOS-стиль кнопок скачування — мінімалістичні */
        .download-btn {
            background: rgba(255, 255, 255, 0.005);
            border: 1px solid rgba(255, 255, 255, 0.005);
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.65rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            cursor: default;
        }

        .download-btn i {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }

        .download-btn.active {
            cursor: pointer;
            border-color: rgba(255, 255, 255, 0.01);
            background: rgba(255, 255, 255, 0.005);
            color: rgba(255, 255, 255, 0.15);
        }

        .download-btn.active i {
            color: #5f9eff;
        }

        .download-btn.active:hover {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.02);
            color: #fff;
            transform: scale(1.02);
        }

        .download-btn.active:hover i {
            color: #8abfff;
        }

        .download-btn.locked {
            opacity: 0.08;
            filter: grayscale(0.9);
            pointer-events: none;
        }

        .model-tag {
            font-size: 0.45rem;
            color: rgba(255, 255, 255, 0.01);
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        /* iOS-футер — тонкий, ледь помітний */
        .window-footer {
            margin-top: 1.8rem;
            padding-top: 1rem;
            border-top: 0.5px solid rgba(255, 255, 255, 0.005);
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.02);
            font-size: 0.5rem;
            letter-spacing: 1.5px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .window-footer span {
            background: rgba(255, 255, 255, 0.005);
            padding: 0.2rem 1rem;
            border-radius: 60px;
        }

        .window-footer i {
            margin-right: 4px;
            opacity: 0.1;
        }

        /* iOS-вотермарк — дуже тонкий */
        .watermark {
            position: absolute;
            bottom: 1.4rem;
            right: 1.8rem;
            font-size: 0.4rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.005);
            pointer-events: none;
            z-index: 1;
            font-weight: 300;
        }

        /* iOS-тост — гладкий, з великим радіусом */
        .ios-toast {
            position: fixed;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: rgba(20, 20, 30, 0.15);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.02);
            border-radius: 80px;
            padding: 0.8rem 2.4rem;
            color: #f0f9ff;
            font-size: 0.9rem;
            font-weight: 400;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.2px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 2px solid #5f9eff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
        }

        .ios-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .ios-toast i {
            font-size: 1rem;
        }

        /* адаптив для iOS */
        @media (max-width: 820px) {
            .twin-container { gap: 1.8rem; }
            .glass-window { 
                flex: 1 1 340px;
                padding: 2rem 1.8rem;
                border-radius: 36px;
            }
        }
        @media (max-width: 500px) {
            body { padding: 0.8rem; }
            .glass-window {
                padding: 1.6rem 1.2rem;
                border-radius: 28px;
                min-width: 0;
            }
            .window-header h2 { font-size: 1.4rem; }
            .download-grid { gap: 0.6rem; }
            .glass-item { padding: 1rem 0.2rem; border-radius: 20px; }
            .login-btn { padding: 0.8rem 1.2rem; }
            .window-header { margin-bottom: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="twin-container">

    <!-- ===== ВІКНО 1: ЛОГІН (iOS стиль) ===== -->
    <div class="glass-window" id="loginWindow">
        <div class="window-header">
            <h2><i class="fas fa-crown"></i> SeWa<span style="font-weight:300;">·</span>вхід</h2>
            <span class="status-badge"><i class="far fa-circle"></i> 2026</span>
        </div>

        <div class="login-form">
            <div class="field">
                <label for="loginField"><i class="fas fa-user-astronaut"></i> Логін</label>
                <input type="text" id="loginField" value="SeWa" placeholder="SeWa">
            </div>
            <div class="field">
                <label for="passField"><i class="fas fa-key"></i> Пароль</label>
                <input type="password" id="passField" value="123123" placeholder="123123">
            </div>
            <button class="login-btn" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Увійти
            </button>
            <div class="auth-status" id="authStatus">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">очікування</span>
                <i class="fas fa-lock" style="opacity:0.1; margin-left:4px;"></i>
            </div>
        </div>

        <div class="window-footer">
            <span><i class="far fa-star"></i> StarCorp</span>
            <span>SeWa666</span>
        </div>
        <div class="watermark">✦ SEWA ✦</div>
    </div>

    <!-- ===== ВІКНО 2: ЗАВАНТАЖЕННЯ (iOS стиль) ===== -->
    <div class="glass-window" id="downloadWindow">
        <div class="window-header">
            <h2><i class="fas fa-cloud-arrow-down"></i> TToren-<span style="font-weight:300;">SeWa</span></h2>
            <span class="status-badge" id="downloadStatusBadge"><i class="fas fa-lock"></i> заблок.</span>
        </div>

        <div class="download-grid" id="downloadGrid">
            <div class="glass-item" data-file="Model-1">
                <div class="item-name"><i class="fas fa-cube"></i> Model-1</div>
                <div class="download-btn locked" data-file="Model-1"><i class="fas fa-download"></i> Скачати</div>
                <div class="model-tag">v1.0</div>
            </div>
            <div class="glass-item" data-file="Model-2">
                <div class="item-name"><i class="fas fa-cubes"></i> Model-2</div>
                <div class="download-btn locked" data-file="Model-2"><i class="fas fa-download"></i> Скачати</div>
                <div class="model-tag">v2.3</div>
            </div>
            <div class="glass-item" data-file="BlockOP-1">
                <div class="item-name"><i class="fas fa-layer-group"></i> BlockOP-1</div>
                <div class="download-btn locked" data-file="BlockOP-1"><i class="fas fa-download"></i> Скачати</div>
                <div class="model-tag">OP-1</div>
            </div>
            <div class="glass-item" data-file="Scan-m1">
                <div class="item-name"><i class="fas fa-qrcode"></i> Scan-m1</div>
                <div class="download-btn locked" data-file="Scan-m1"><i class="fas fa-download"></i> Скачати</div>
                <div class="model-tag">m1</div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 0.1rem; font-size: 0.45rem; color: rgba(255,255,255,0.01); letter-spacing: 3px; position: relative; z-index:2;">
            <span># TToren-SeWa</span>
        </div>

        <div class="window-footer">
            <span><i class="fas fa-shield-alt"></i> Усі права захищені</span>
            <span>StarCorp-2026.2029</span>
        </div>
        <div class="watermark">⬇︎ DOWNLOAD</div>
    </div>
</div>

<!-- iOS-тост -->
<div class="ios-toast" id="iosToast">
    <i class="fas fa-circle-check" style="color: #6affa0;"></i>
    <span id="toastMessage">Готово</span>
</div>

<script>
    (function() {
        // Елементи
        const loginBtn = document.getElementById('loginBtn');
        const loginField = document.getElementById('loginField');
        const passField = document.getElementById('passField');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const downloadStatusBadge = document.getElementById('downloadStatusBadge');
        const downloadBtns = document.querySelectorAll('.download-btn');
        const toast = document.getElementById('iosToast');
        const toastMsg = document.getElementById('toastMessage');

        let isAuthorized = false;

        // Функція показу iOS-тосту
        function showToast(message, type = 'success') {
            const icon = toast.querySelector('i');
            if (type === 'success') {
                icon.className = 'fas fa-circle-check';
                icon.style.color = '#6affa0';
                toast.style.borderLeftColor = '#6affa0';
            } else if (type === 'error') {
                icon.className = 'fas fa-circle-xmark';
                icon.style.color = '#ff6b6b';
                toast.style.borderLeftColor = '#ff6b6b';
            } else {
                icon.className = 'fas fa-circle-info';
                icon.style.color = '#7eb3ff';
                toast.style.borderLeftColor = '#7eb3ff';
            }
            toastMsg.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3200);
        }

        // Оновлення UI
        function updateUI(authState) {
            isAuthorized = authState;

            if (authState) {
                statusDot.className = 'dot green';
                statusText.textContent = 'авторизовано ✓';
                downloadStatusBadge.innerHTML = '<i class="fas fa-check-circle" style="color: #5dffa0;"></i> відкрито';
                downloadStatusBadge.style.color = 'rgba(255,255,255,0.15)';
            } else {
                statusDot.className = 'dot red';
                statusText.textContent = 'помилка входу';
                downloadStatusBadge.innerHTML = '<i class="fas fa-lock"></i> заблок.';
                downloadStatusBadge.style.color = 'rgba(255,255,255,0.05)';
            }

            downloadBtns.forEach(btn => {
                if (authState) {
                    btn.classList.remove('locked');
                    btn.classList.add('active');
                } else {
                    btn.classList.add('locked');
                    btn.classList.remove('active');
                }
            });
        }

        // Обробка логіну
        function handleLogin() {
            const loginVal = loginField.value.trim();
            const passVal = passField.value.trim();

            if (loginVal === 'SeWa' && passVal === '123123') {
                updateUI(true);
                showToast('✅ Вхід виконано! Доступ до завантажень відкрито.', 'success');
            } else {
                updateUI(false);
                showToast('❌ Невірний логін або пароль. Спробуйте SeWa / 123123', 'error');
                // iOS-ефект легкого підсвічування
                loginField.style.borderColor = 'rgba(255,80,80,0.06)';
                passField.style.borderColor = 'rgba(255,80,80,0.06)';
                setTimeout(() => {
                    loginField.style.borderColor = '';
                    passField.style.borderColor = '';
                }, 800);
            }
        }

        // Події
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            handleLogin();
        });

        document.querySelectorAll('#loginField, #passField').forEach(field => {
            field.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
        });

        downloadBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!isAuthorized) {
                    showToast('🔒 Спочатку увійдіть в акаунт (SeWa / 123123)', 'error');
                    return;
                }
                const parentItem = this.closest('.glass-item');
                let fileName = 'файл';
                if (parentItem) {
                    const nameEl = parentItem.querySelector('.item-name');
                    if (nameEl) fileName = nameEl.innerText.trim();
                }
                showToast(`⬇️ Завантаження ${fileName} ...`, 'info');
            });
        });

        // Стартовий стан — заблоковано
        updateUI(false);

        console.log('✨ StarCorp SeWa666 · iOS-стиль');
    })();
</script>
</body>
</html>
